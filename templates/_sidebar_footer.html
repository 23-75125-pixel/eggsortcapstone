<!-- Shared pinned sidebar identity and logout footer -->
<div class="shrink-0 p-4 border-t border-white/10 bg-inverse-surface">
  <div class="bg-black/20 rounded-xl p-3 flex items-center gap-3 mb-3">
    <div class="w-10 h-10 rounded-full bg-primary-container/30 flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-white">account_circle</span>
    </div>
    <div class="min-w-0">
      <p class="text-white font-bold text-sm truncate" title="{{ username }}">
        {{ username | default("User", true) }}
      </p>
      <p class="text-surface-variant/70 text-xs truncate" title="Roxas Farm">
        Roxas Farm
      </p>
      <p class="text-primary-fixed/80 text-[11px] flex items-center gap-1 mt-0.5">
        <span class="w-1.5 h-1.5 rounded-full bg-primary-container shrink-0"></span>
        Admin
      </p>
    </div>
  </div>
  <a
    class="w-full text-surface-variant/70 hover:text-white transition-colors py-3 px-4 flex items-center justify-center gap-2 hover:bg-surface-variant/10 active:scale-95 duration-150 ease-in-out rounded-lg border border-white/10"
    href="/logout"
  >
    <span class="material-symbols-outlined text-[20px]">logout</span>
    <span class="font-button text-button">Log Out</span>
  </a>
</div>
